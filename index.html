<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music IA - Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Substitua 'background.jpg' pela sua imagem de fundo */
            background: url('https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=1920&h=1080&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h1 { margin-bottom: 1.5rem; letter-spacing: 2px; text-transform: uppercase; }

        /* Estilização do Player de Áudio */
        .audio-player {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 2rem;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            justify-content: center;
        }

        button {
            background: #ff0055;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #ff3377; transform: scale(1.05); }

        input[type="range"] {
            flex-grow: 1;
            cursor: pointer;
            accent-color: #ff0055;
        }

        /* Espaço para o Vídeo do YouTube */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* Proporção 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .label { margin-bottom: 10px; display: block; font-size: 0.9rem; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h1>Music IA Station</h1>

    <div class="audio-player">
        <span class="label">OUVIR TRACK ORIGINAL</span>
        <audio id="myAudio">
            <source src="sua_musica.mp3" type="audio/mpeg">
            Seu navegador não suporta áudio.
        </audio>
        
        <div class="controls">
            <button onclick="playAudio()">PLAY</button>
            <button onclick="pauseAudio()">PAUSE</button>
            <input type="range" id="seekSlider" value="0" max="100">
        </div>
    </div>

    <div class="video-section">
        <span class="label">CLIPE OFICIAL / PROCESSO DE CRIAÇÃO</span>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>
    </div>
</div>

<script>
    const audio = document.getElementById("myAudio");
    const slider = document.getElementById("seekSlider");

    function playAudio() { audio.play(); }
    function pauseAudio() { audio.pause(); }

    // Atualiza a linha do tempo conforme a música toca
    audio.ontimeupdate = () => {
        const percentage = (audio.currentTime / audio.duration) * 100;
        slider.value = percentage;
    };

    // Permite clicar na linha do tempo para mudar a posição da música
    slider.oninput = () => {
        const time = (slider.value / 100) * audio.duration;
        audio.currentTime = time;
    };
</script>

</body>
</html>
